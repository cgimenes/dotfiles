[opener]
zathura = [{run = 'zathura "$@"', desc = "zathura", orphan = true, for = "unix"}]
imv = [{run = 'imv "$@"', desc = "imv", orphan = true, for = "unix"}]
edit = [{ run = 'nvim "$@"', block = true, desc = 'Edit with Neovim', for = 'unix' }]

[open]
prepend_rules = [
  {mime = "application/pdf", use = ["zathura"]},
  {mime = "image/*", use = ["imv"]},
  { mime = 'text/*', use = 'edit' },
  { mime = 'application/json', use = 'edit' },
  { mime = 'application/xml', use = 'edit' },
  { url = '*.toml', use = 'edit' },
  { url = '*.json', use = 'edit' },
  { url = '*.kdl', use = 'edit' },
  { url = '*.yml', use = 'edit' },
  { url = '*.yaml', use = 'edit' },
  { url = '*.conf', use = 'edit' },
]
