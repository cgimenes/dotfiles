config_version = 2

[bar.default]
capsule = true
center = [ "workspaces" ]
end = [ "tray", "cpu", "ram", "network", "brightness", "battery", "keyboard_layout", "control-center", "clock" ]
font_family = "Asap"
margin_ends = 0
start = [ "volume", "media" ]

[control_center]
sidebar = "full"
sidebar_section = "full"

[desktop_widgets]
enabled = false
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
enabled = false

[idle]
behavior_order = [ "screen-off", "lock", "idle-behavior", "lock-and-suspend" ]
pre_action_fade_seconds = 15

    [idle.behavior.idle-behavior]
    action = "suspend"
    enabled = true
    lock_before_suspend = false
    timeout = 600.0

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 360.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = false
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 300.0

[location]
address = "Guarapuava, Brazil"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[nightlight]
enabled = true

[shell]
font_family = "Asap"

    [shell.launcher]
    categories = false

    [shell.panel]
    clipboard_placement = "attached"
    launcher_placement = "attached"
    open_near_click_control_center = true
    polkit_placement = "attached"

    [shell.screen_corners]
    enabled = true

[theme]
builtin = "Kanagawa"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "niri", "qt" ]
    community_ids = [ "spicetify" ]

[wallpaper.default]
path = "/home/oliveira/Pictures/Wallpapers/Arch Wallpapers/2.jpg"

[wallpaper.last]
path = "/home/oliveira/Pictures/Wallpapers/Arch Wallpapers/2.jpg"

[wallpaper.monitors.eDP-1]
path = "/home/oliveira/Pictures/Wallpapers/Arch Wallpapers/2.jpg"

[[wallpaper.favorite]]
path = "/home/oliveira/Pictures/Wallpapers/e5evld5dpvjg1.jpeg"
theme_mode = "auto"

[[wallpaper.favorite]]
builtin_palette = "Kanagawa"
palette_source = "builtin"
path = "/home/oliveira/Pictures/Wallpapers/wallhaven-yqv2wx.jpg"
theme_mode = "dark"

[widget.bluetooth]
enabled = false

[widget.clock]
format = "{:%H:%M} • {:%d %b}"

[widget.cpu]
display = "text"
show_label = false

[widget.keyboard_layout]
display = "full"
hide_when_single_layout = true
show_label = false

[widget.network]
show_label = false

[widget.ram]
display = "text"
show_label = false
stat = "ram_pct"

[widget.workspaces]
display = "none"
labels_only_when_occupied = true